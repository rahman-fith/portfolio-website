      min-height: 100vh;

      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .page-header {
      text-align: center;
      margin-bottom: 40px;
      max-width: 1300px;
      width: 100%;
    }
    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #C9A84C;
      margin-bottom: 12px;
      opacity: 0.85;

    .main-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 46px;
      font-weight: 600;
      color: #f0ede6;
      letter-spacing: -0.01em;
      line-height: 1.05;

    .main-title .gold { color: #C9A84C; }
    .subtitle {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: #4a4a4a;
      margin-top: 10px;
      letter-spacing: 0.07em;
      font-weight: 300;
      text-transform: uppercase;
    }
    .diagram-container {
      width: 100%;
      max-width: 1300px;
      overflow-x: auto;
      border: 1px solid #1e1e1e;
      border-radius: 12px;
    }
    svg { display: block; }
    .legend-wrap {
      margin-top: 28px;
      display: flex;
      gap: 0;
      justify-content: center;
      max-width: 900px;
      width: 100%;
      border: 1px solid #1e1e1e;
      border-radius: 8px;
      overflow: hidden;
    }
    .legend-section {
      flex: 1;
      padding: 16px 24px;
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      align-items: center;
    }
    .legend-section.left { background: #0f0809; border-right: 1px solid #1e1e1e; }
    .legend-section.right { background: #0b0b06; }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: #666;
      letter-spacing: 0.04em;
    }
    .legend-swatch {
      width: 28px;
      height: 16px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .legend-swatch.process-red { background: #1c1010; border: 1.5px solid #7A3535; }
    .legend-swatch.process-gold { background: #141200; border: 1.5px solid #C9A84C; }
    .legend-swatch.decision { background: #1c1010; border: 1.5px solid #A04040; border-radius: 2px; transform: rotate(10deg); }
    .legend-swatch.risk { background: #2a0f0f; border: 1.5px solid #c04040; }
    .legend-swatch.wait { background: #151515; border: 1.5px solid #444; }
    .legend-swatch.alert { background: #1e1a06; border: 1.5px solid #C9A84C; box-shadow: 0 0 5px #C9A84C55; }
    .legend-pill {
      width: 28px;
      height: 14px;
      border-radius: 7px;
      flex-shrink: 0;
    }
    .legend-pill.start-end-left { background: #1e1212; border: 1.5px solid #664040; }
    .legend-pill.start-end-right { background: #1a1600; border: 1.5px solid #C9A84C; }
  </style>
